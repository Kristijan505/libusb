name: libusb
description: Dart wrapper via `dart:ffi` for https://github.com/libusb/libusb
version: 1.0.0
homepage: https://github.com/woodemi/libusb.dart

environment:
  sdk: '>=3.11.0 <4.0.0'

platforms:
  android:
  linux:
  macos:
  windows:

dependencies:
  code_assets: ^1.0.0
  crypto: ^3.0.7
  ffi: ^2.2.0
  hooks: ^1.0.0
  logging: ^1.3.0

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.1.0
  test: ^1.30.0

ffigen:
  name: Libusb
  description: Bindings to `libusb.h`.
  output: 'lib/src/libusb.ffigen.dart'
  headers:
    entry-points:
      - 'libusb-1.0/libusb.h'
    include-directives: # include only these header files and necessary structs from other header files
      - '**libusb.h'
  ffi-native:
    asset-id: 'package:libusb/libusb.dart'
  library-imports:
    pkg_libusb: 'package:libusb/src/libusb_base.dart'
  type-map:
    'typedefs':
      'ssize_t':
        'lib': 'pkg_libusb'
        'c-type': 'Ssize'
        'dart-type': 'int'
    'structs':
      'timeval':
        'lib': 'pkg_libusb'
        'c-type': 'Timeval'
        'dart-type': 'Timeval'
